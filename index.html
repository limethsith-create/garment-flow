<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>GarmentFlow</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000;--surface:#111;--surface2:#1a1a1a;--surface3:#222;
  --border:#2a2a2a;--border2:#333;
  --text:#fff;--text2:#aaa;--text3:#666;
  --accent:#fff;--accent-dim:#888;
  --green:#4ade80;--red:#f87171;--yellow:#fbbf24;
  --radius:12px;--radius-sm:8px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --nav-h:64px;
}
html,body{
  height:100%;width:100%;
  background:var(--bg);color:var(--text);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  font-size:15px;line-height:1.5;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}
body{
  padding-top:env(safe-area-inset-top,0px);
  padding-bottom:calc(var(--nav-h) + var(--safe-b) + 8px);
}

/* Header */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:16px 20px 12px;
  border-bottom:1px solid var(--border);
}
.header h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.header-sub{font-size:12px;color:var(--text3);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.header-actions{display:flex;gap:8px;position:absolute;right:16px;top:50%;transform:translateY(-50%)}
.header-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;transition:all .2s;
}
.header-btn:active{background:var(--surface3);transform:scale(.92)}

/* Bottom Nav */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(0,0,0,.9);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;
  padding-bottom:var(--safe-b);
  height:calc(var(--nav-h) + var(--safe-b));
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;cursor:pointer;padding:8px 0;
  color:var(--text3);transition:color .2s;
  -webkit-user-select:none;user-select:none;
}
.nav-item.active{color:var(--text)}
.nav-item svg{width:22px;height:22px}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}

/* Page container */
#app{
  min-height:100%;padding:0 0 24px;
}
.page{display:none;padding:16px}
.page.active{display:block}

/* Stat Cards */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:6px}
.stat-value{font-size:22px;font-weight:700;letter-spacing:-.5px}
.stat-value.green{color:var(--green)}
.stat-value.red{color:var(--red)}

/* Chart */
.chart-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;margin-bottom:20px;
}
.chart-card h3{font-size:13px;color:var(--text2);font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:.3px}
.chart-wrap{height:200px;position:relative}

/* Search */
.search-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:0 14px;margin-bottom:16px;
  height:44px;
}
.search-bar svg{width:18px;height:18px;color:var(--text3);flex-shrink:0}
.search-bar input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:14px;font-family:inherit;
}
.search-bar input::placeholder{color:var(--text3)}

/* Cards - Products, Sales, Buyers */
.card-list{display:flex;flex-direction:column;gap:10px}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;
  cursor:pointer;transition:all .15s;
  -webkit-user-select:none;user-select:none;
}
.card:active{background:var(--surface2);transform:scale(.98)}
.card-row{display:flex;align-items:center;gap:12px}
.card-thumb{
  width:48px;height:48px;border-radius:var(--radius-sm);
  background:var(--surface3);object-fit:cover;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:var(--text3);font-size:20px;overflow:hidden;
}
.card-thumb img{width:100%;height:100%;object-fit:cover}
.card-info{flex:1;min-width:0}
.card-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:12px;color:var(--text3);margin-top:2px}
.card-right{text-align:right;flex-shrink:0}
.card-amount{font-size:14px;font-weight:700}
.card-badge{
  display:inline-block;font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:20px;margin-top:4px;
  text-transform:uppercase;letter-spacing:.3px;
}
.badge-accepted{background:rgba(74,222,128,.15);color:var(--green)}
.badge-partial{background:rgba(251,191,36,.15);color:var(--yellow)}
.badge-pending{background:rgba(255,255,255,.1);color:var(--text2)}

/* Filter chips */
.filter-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.chip{
  padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;
  white-space:nowrap;cursor:pointer;transition:all .2s;
  background:var(--surface);border:1px solid var(--border);color:var(--text2);
}
.chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}

/* FAB */
.fab{
  position:fixed;right:20px;
  bottom:calc(var(--nav-h) + var(--safe-b) + 16px);
  width:52px;height:52px;border-radius:50%;
  background:var(--text);color:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:300;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  cursor:pointer;z-index:150;
  transition:transform .2s;border:none;
}
.fab:active{transform:scale(.9)}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:none;align-items:flex-end;justify-content:center;
  opacity:0;transition:opacity .25s;
}
.modal-overlay.show{display:flex;opacity:1}
.modal{
  background:var(--surface);
  border-radius:20px 20px 0 0;
  width:100%;max-width:500px;
  max-height:90vh;overflow-y:auto;
  padding:24px 20px calc(20px + var(--safe-b));
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);
}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-handle{
  width:36px;height:4px;background:var(--border2);
  border-radius:2px;margin:0 auto 20px;
}
.modal h2{font-size:18px;font-weight:700;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.form-input{
  width:100%;height:48px;padding:0 14px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);
  font-size:15px;font-family:inherit;outline:none;
  transition:border-color .2s;
}
.form-input:focus{border-color:var(--text2)}
select.form-input{-webkit-appearance:none;appearance:none;cursor:pointer}
textarea.form-input{height:80px;padding:12px 14px;resize:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{
  width:100%;height:48px;border:none;border-radius:var(--radius-sm);
  font-size:15px;font-weight:600;font-family:inherit;
  cursor:pointer;transition:all .15s;
}
.btn-primary{background:var(--text);color:var(--bg)}
.btn-primary:active{opacity:.8;transform:scale(.98)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.btn-danger:active{background:rgba(248,113,113,.25)}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}

/* Detail View */
.detail-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.back-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;flex-shrink:0;
}
.back-btn:active{background:var(--surface3)}
.detail-title{font-size:18px;font-weight:700}
.detail-img{
  width:100%;aspect-ratio:4/3;object-fit:cover;
  border-radius:var(--radius);background:var(--surface2);
  margin-bottom:16px;
}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.detail-cell{background:var(--surface);padding:14px}
.detail-cell-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px}
.detail-cell-value{font-size:15px;font-weight:600}

/* Photo upload */
.photo-upload{
  width:100%;aspect-ratio:3/2;
  border:2px dashed var(--border2);border-radius:var(--radius);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;cursor:pointer;margin-bottom:16px;
  color:var(--text3);font-size:13px;overflow:hidden;
  position:relative;
}
.photo-upload img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.photo-upload input{display:none}

/* Toast */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);
  background:var(--surface2);color:var(--text);
  padding:12px 20px;border-radius:var(--radius);
  font-size:13px;font-weight:600;z-index:500;
  border:1px solid var(--border);
  transition:transform .3s cubic-bezier(.32,.72,0,1);
  white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Empty state */
.empty-state{
  text-align:center;padding:60px 20px;color:var(--text3);
}
.empty-state svg{width:48px;height:48px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:14px}

/* Preview row in sale form */
.preview-row{
  display:flex;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--border);
  font-size:13px;
}
.preview-row span:first-child{color:var(--text2)}
.preview-row span:last-child{font-weight:600}

/* Section title */
.section-title{
  font-size:13px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:.5px;
  margin-bottom:12px;padding-left:4px;
}

/* Settings menu */
.settings-menu{
  position:absolute;right:16px;top:56px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  min-width:180px;z-index:110;display:none;
  box-shadow:0 8px 30px rgba(0,0,0,.4);
}
.settings-menu.show{display:block}
.settings-item{
  padding:12px 16px;font-size:14px;cursor:pointer;
  display:flex;align-items:center;gap:10px;color:var(--text2);
  border-bottom:1px solid var(--border);
}
.settings-item:last-child{border-bottom:none}
.settings-item:active{background:var(--surface3)}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn .3s ease}
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Header -->
<div class="header">
  <h1>GarmentFlow</h1>
  <div class="header-sub" id="headerSub">Dashboard</div>
  <div class="header-actions">
    <div class="header-btn" id="settingsBtn" onclick="toggleSettings()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    </div>
  </div>
  <div class="settings-menu" id="settingsMenu">
    <div class="settings-item" onclick="exportToExcel()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Export Excel</div>
    <div class="settings-item" onclick="backupData()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Backup Data</div>
    <div class="settings-item" onclick="document.getElementById('restoreInput').click()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Restore Data</div>
    <input type="file" id="restoreInput" accept=".json" style="display:none" onchange="restoreData(this.files[0])">
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="page active" id="page-dashboard"></div>
  <div class="page" id="page-products"></div>
  <div class="page" id="page-sales"></div>
  <div class="page" id="page-buyers"></div>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="handleFab()">+</button>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span class="nav-label">Home</span>
  </div>
  <div class="nav-item" data-page="products" onclick="navigate('products')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
    <span class="nav-label">Products</span>
  </div>
  <div class="nav-item" data-page="sales" onclick="navigate('sales')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
    <span class="nav-label">Sales</span>
  </div>
  <div class="nav-item" data-page="buyers" onclick="navigate('buyers')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
    <span class="nav-label">Buyers</span>
  </div>
</nav>

<!-- Modal Overlay -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ==================== DATABASE ====================
const DB_NAME='GarmentFlowDB';const DB_VER=1;
const STORES={products:'products',buyers:'buyers',sales:'sales'};
let db=null;

function openDB(){
  return new Promise((resolve,reject)=>{
    if(db){resolve(db);return}
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains(STORES.products))d.createObjectStore(STORES.products,{keyPath:'id'});
      if(!d.objectStoreNames.contains(STORES.buyers))d.createObjectStore(STORES.buyers,{keyPath:'id'});
      if(!d.objectStoreNames.contains(STORES.sales))d.createObjectStore(STORES.sales,{keyPath:'id'});
    };
    r.onsuccess=e=>{db=e.target.result;resolve(db)};
    r.onerror=e=>reject(e.target.error);
  });
}

function dbAdd(store,item){
  return openDB().then(d=>new Promise((res,rej)=>{
    const tx=d.transaction(store,'readwrite');
    tx.objectStore(store).add(item);
    tx.oncomplete=()=>res(item);
    tx.onerror=e=>rej(e.target.error);
  }));
}

function dbGetAll(store){
  return openDB().then(d=>new Promise((res,rej)=>{
    const tx=d.transaction(store,'readonly');
    const r=tx.objectStore(store).getAll();
    r.onsuccess=()=>res(r.result);
    r.onerror=e=>rej(e.target.error);
  }));
}

function dbGet(store,id){
  return openDB().then(d=>new Promise((res,rej)=>{
    const tx=d.transaction(store,'readonly');
    const r=tx.objectStore(store).get(id);
    r.onsuccess=()=>res(r.result);
    r.onerror=e=>rej(e.target.error);
  }));
}

function dbUpdate(store,item){
  return openDB().then(d=>new Promise((res,rej)=>{
    const tx=d.transaction(store,'readwrite');
    tx.objectStore(store).put(item);
    tx.oncomplete=()=>res(item);
    tx.onerror=e=>rej(e.target.error);
  }));
}

function dbDelete(store,id){
  return openDB().then(d=>new Promise((res,rej)=>{
    const tx=d.transaction(store,'readwrite');
    tx.objectStore(store).delete(id);
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e.target.error);
  }));
}

// ==================== UTILS ====================
function formatCurrency(n){return 'Rs. '+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function formatCurrencyShort(n){
  const v=Number(n||0);
  if(v>=1e6)return 'Rs. '+(v/1e6).toFixed(1)+'M';
  if(v>=1e3)return 'Rs. '+(v/1e3).toFixed(1)+'K';
  return 'Rs. '+v.toFixed(0);
}
function formatDate(d){if(!d)return'-';const dt=new Date(d);return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function escHtml(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function genId(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5)}

// ==================== NAVIGATION ====================
let currentPage='dashboard';

function navigate(page){
  currentPage=page;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>{
    n.classList.toggle('active',n.dataset.page===page);
  });
  const titles={dashboard:'Dashboard',products:'Products',sales:'Sales',buyers:'Buyers'};
  document.getElementById('headerSub').textContent=titles[page]||'';
  document.getElementById('fab').style.display=(page==='dashboard')?'none':'flex';
  closeSettings();
  renderPage(page);
}

function renderPage(page){
  switch(page){
    case'dashboard':renderDashboard();break;
    case'products':renderProducts();break;
    case'sales':renderSales();break;
    case'buyers':renderBuyers();break;
  }
}

// ==================== TOAST ====================
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ==================== SETTINGS ====================
function toggleSettings(){
  document.getElementById('settingsMenu').classList.toggle('show');
}
function closeSettings(){
  document.getElementById('settingsMenu').classList.remove('show');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('#settingsBtn')&&!e.target.closest('#settingsMenu'))closeSettings();
});

// ==================== FAB ====================
function handleFab(){
  switch(currentPage){
    case'products':showAddProductModal();break;
    case'sales':showAddSaleModal();break;
    case'buyers':showAddBuyerModal();break;
  }
}

// ==================== MODAL ====================
function openModal(html){
  const overlay=document.getElementById('modalOverlay');
  document.getElementById('modalContent').innerHTML='<div class="modal-handle"></div>'+html;
  overlay.classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal(){
  const overlay=document.getElementById('modalOverlay');
  overlay.classList.remove('show');
  document.body.style.overflow='';
}

// ==================== DASHBOARD ====================
let revenueChart=null;

async function renderDashboard(){
  const [products,sales,buyers]=await Promise.all([
    dbGetAll(STORES.products),dbGetAll(STORES.sales),dbGetAll(STORES.buyers)
  ]);
  const totalRev=sales.reduce((s,x)=>{
    const p=products.find(pr=>pr.id===x.productId);
    return s+(p?(x.acceptedQty||0)*p.price:0);
  },0);
  const totalOffered=sales.reduce((s,x)=>s+(x.offeredQty||0),0);
  const totalAccepted=sales.reduce((s,x)=>s+(x.acceptedQty||0),0);
  const acceptRate=totalOffered?Math.round(totalAccepted/totalOffered*100):0;

  document.getElementById('page-dashboard').innerHTML=`
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Revenue</div>
        <div class="stat-value">${formatCurrencyShort(totalRev)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Accept Rate</div>
        <div class="stat-value">${acceptRate}%</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Products</div>
        <div class="stat-value">${products.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Buyers</div>
        <div class="stat-value">${buyers.length}</div>
      </div>
    </div>
    <div class="chart-card">
      <h3>Monthly Revenue</h3>
      <div class="chart-wrap"><canvas id="revenueCanvas"></canvas></div>
    </div>
    <div class="section-title">Recent Sales</div>
    <div class="card-list" id="recentSales">
      ${sales.length===0?'<div class="empty-state"><p>No sales recorded yet</p></div>':
        sales.sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5).map(s=>{
          const p=products.find(pr=>pr.id===s.productId);
          const b2=buyers.find(bu=>bu.id===s.buyerId);
          const rev=p?(s.acceptedQty||0)*p.price:0;
          return`<div class="card" onclick="viewSale('${s.id}')">
            <div class="card-row">
              <div class="card-thumb">${p&&p.photo?`<img src="${p.photo}">`:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/></svg>'}</div>
              <div class="card-info">
                <div class="card-title">${escHtml(p?p.name:'Unknown Product')}</div>
                <div class="card-sub">${escHtml(b2?b2.name:'Unknown')} &middot; ${formatDate(s.date)}</div>
              </div>
              <div class="card-right">
                <div class="card-amount">${formatCurrencyShort(rev)}</div>
              </div>
            </div>
          </div>`;
        }).join('')}
    </div>
  `;
  buildRevenueChart(sales,products);
}

function buildRevenueChart(sales,products){
  const canvas=document.getElementById('revenueCanvas');
  if(!canvas)return;
  if(revenueChart){revenueChart.destroy();revenueChart=null}
  const months={};
  sales.forEach(s=>{
    const d=new Date(s.date);
    const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const p=products.find(pr=>pr.id===s.productId);
    const rev=p?(s.acceptedQty||0)*p.price:0;
    months[key]=(months[key]||0)+rev;
  });
  const sorted=Object.entries(months).sort((a,b)=>a[0].localeCompare(b[0]));
  const labels=sorted.map(([k])=>{const[y,m]=k.split('-');return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]+' '+y.slice(2)});
  const data=sorted.map(([,v])=>v);
  revenueChart=new Chart(canvas,{
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:'rgba(255,255,255,.2)',borderColor:'rgba(255,255,255,.6)',borderWidth:1,borderRadius:6,barPercentage:.6}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#666',font:{size:10}},grid:{display:false},border:{display:false}},
        y:{ticks:{color:'#666',font:{size:10},callback:v=>formatCurrencyShort(v)},grid:{color:'rgba(255,255,255,.05)'},border:{display:false}}
      }
    }
  });
}

// ==================== SALES ====================
async function renderSales(filter='',designFilter=''){
  const [sales,products,buyers]=await Promise.all([
    dbGetAll(STORES.sales),dbGetAll(STORES.products),dbGetAll(STORES.buyers)
  ]);
  let filtered=sales;
  if(filter)filtered=filtered.filter(s=>{
    const p=products.find(pr=>pr.id===s.productId);
    const b=buyers.find(bu=>bu.id===s.buyerId);
    const q=filter.toLowerCase();
    return (p&&p.name.toLowerCase().includes(q))||(b&&b.name.toLowerCase().includes(q));
  });
  if(designFilter)filtered=filtered.filter(s=>{
    const p=products.find(pr=>pr.id===s.productId);
    return p&&p.designNo&&p.designNo.toLowerCase().includes(designFilter.toLowerCase());
  });
  filtered.sort((a,b)=>new Date(b.date)-new Date(a.date));

  // Get unique design numbers for filter chips
  const designs=[...new Set(sales.map(s=>{const p=products.find(pr=>pr.id===s.productId);return p?p.designNo:null}).filter(Boolean))];

  document.getElementById('page-sales').innerHTML=`
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search sales..." value="${escHtml(filter)}" oninput="filterSales(this.value)">
    </div>
    ${designs.length>0?`<div class="filter-row">
      <div class="chip ${designFilter?'':'active'}" onclick="filterSalesByDesign('')">All</div>
      ${designs.map(d=>`<div class="chip ${designFilter===d?'active':''}" onclick="filterSalesByDesign('${escHtml(d)}')">${escHtml(d)}</div>`).join('')}
    </div>`:''}
    <div class="card-list">
      ${filtered.length===0?'<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><p>No sales recorded yet</p></div>':
        filtered.map(s=>{
          const p=products.find(pr=>pr.id===s.productId);
          const b=buyers.find(bu=>bu.id===s.buyerId);
          const rev=p?(s.acceptedQty||0)*p.price:0;
          const status=s.acceptedQty>=s.offeredQty?'accepted':s.acceptedQty>0?'partial':'pending';
          const statusLabel=status==='accepted'?'Full':status==='partial'?'Partial':'Pending';
          return`<div class="card" onclick="viewSale('${s.id}')">
            <div class="card-row">
              <div class="card-thumb">${p&&p.photo?`<img src="${p.photo}">`:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>'}</div>
              <div class="card-info">
                <div class="card-title">${escHtml(p?p.name:'Unknown')}</div>
                <div class="card-sub">${escHtml(b?b.name:'Unknown')} &middot; ${formatDate(s.date)}</div>
              </div>
              <div class="card-right">
                <div class="card-amount">${formatCurrencyShort(rev)}</div>
                <div class="card-badge badge-${status}">${statusLabel}</div>
              </div>
            </div>
          </div>`;
        }).join('')}
    </div>
  `;
}
let _salesFilter='',_designFilter='';
function filterSales(v){_salesFilter=v;renderSales(v,_designFilter)}
function filterSalesByDesign(v){_designFilter=v;renderSales(_salesFilter,v)}

async function renderBuyers(filter=''){
  const [buyers,sales,products]=await Promise.all([
    dbGetAll(STORES.buyers),dbGetAll(STORES.sales),dbGetAll(STORES.products)
  ]);
  const filtered=filter?buyers.filter(b=>b.name.toLowerCase().includes(filter.toLowerCase())||
    (b.company&&b.company.toLowerCase().includes(filter.toLowerCase()))):buyers;

  document.getElementById('page-buyers').innerHTML=`
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search buyers..." value="${escHtml(filter)}" oninput="filterBuyers(this.value)">
    </div>
    <div class="card-list">
      ${filtered.length===0?'<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><p>No buyers yet</p></div>':
        filtered.map(b=>{
          const bSales=sales.filter(s=>s.buyerId===b.id);
          const totalSpent=bSales.reduce((sum,s)=>{
            const p=products.find(pr=>pr.id===s.productId);
            return sum+(p?(s.acceptedQty||0)*p.price:0);
          },0);
          return`<div class="card" onclick="viewBuyer('${b.id}')">
            <div class="card-row">
              <div class="card-thumb" style="background:var(--surface3);font-size:16px;font-weight:700">${(b.name||'?')[0].toUpperCase()}</div>
              <div class="card-info">
                <div class="card-title">${escHtml(b.name)}</div>
                <div class="card-sub">${escHtml(b.company||'No company')} &middot; ${bSales.length} sales</div>
              </div>
              <div class="card-right">
                <div class="card-amount">${formatCurrencyShort(totalSpent)}</div>
              </div>
            </div>
          </div>`;
        }).join('')}
    </div>
  `;
}
function filterBuyers(v){renderBuyers(v)}

function handlePhoto(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    _tempPhoto=e.target.result;
    const upload=document.getElementById('photoUpload');
    upload.innerHTML=`<img src="${_tempPhoto}"><input type="file" id="photoInput" accept="image/*" capture="environment" onchange="handlePhoto(this)">`;
  };
  reader.readAsDataURL(file);
}

async function saveProduct(){
  const name=document.getElementById('fName').value.trim();
  const price=parseFloat(document.getElementById('fPrice').value)||0;
  if(!name){toast('Please enter a product name');return}
  const product={
    id:genId(),
    name,
    designNo:document.getElementById('fDesign').value.trim(),
    price,
    category:document.getElementById('fCategory').value.trim(),
    sizes:document.getElementById('fSizes').value.trim(),
    notes:document.getElementById('fNotes').value.trim(),
    photo:_tempPhoto,
    createdAt:new Date().toISOString()
  };
  await dbAdd(STORES.products,product);
  closeModal();toast('Product added');renderProducts();
}

async function updateSalePreview(){
  const productId=document.getElementById('sProduct').value;
  const offered=parseInt(document.getElementById('sOffered').value)||0;
  const accepted=parseInt(document.getElementById('sAccepted').value)||0;
  if(!productId)return;
  const p=await dbGet(STORES.products,productId);
  if(!p)return;
  const rev=accepted*p.price;
  document.getElementById('salePreview').innerHTML=`
    <div class="preview-row"><span>Unit Price</span><span>${formatCurrency(p.price)}</span></div>
    <div class="preview-row"><span>Offered Value</span><span>${formatCurrency(offered*p.price)}</span></div>
    <div class="preview-row"><span>Accepted Value</span><span style="color:var(--green)">${formatCurrency(rev)}</span></div>
  `;
}

async function saveSale(){
  const productId=document.getElementById('sProduct').value;
  const buyerId=document.getElementById('sBuyer').value;
  const date=document.getElementById('sDate').value;
  const offered=parseInt(document.getElementById('sOffered').value)||0;
  const accepted=parseInt(document.getElementById('sAccepted').value)||0;
  if(!productId||!buyerId){toast('Please select product and buyer');return}
  if(!offered){toast('Please enter offered quantity');return}
  const sale={
    id:genId(),productId,buyerId,date,
    offeredQty:offered,acceptedQty:accepted,
    notes:document.getElementById('sNotes').value.trim(),
    createdAt:new Date().toISOString()
  };
  await dbAdd(STORES.sales,sale);
  closeModal();toast('Sale recorded');renderSales();
}

      <label class="form-label">Company</label>
      <input class="form-input" id="bCompany" placeholder="Company name">
    </div>
    <div class="form-group">
      <label class="form-label">Phone</label>
      <input class="form-input" id="bPhone" type="tel" inputmode="tel" placeholder="Phone number">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" id="bEmail" type="email" inputmode="email" placeholder="Email address">
    </div>
    <div class="form-group">
      <label class="form-label">Address</label>
      <textarea class="form-input" id="bAddress" placeholder="Full address"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-input" id="bNotes" placeholder="Additional notes..."></textarea>
    </div>
    <button class="btn btn-primary" onclick="saveBuyer()">Save Buyer</button>
  `);
}

async function saveBuyer(){
  const name=document.getElementById('bName').value.trim();
  if(!name){toast('Please enter buyer name');return}
  const buyer={
    id:genId(),name,
    company:document.getElementById('bCompany').value.trim(),
    phone:document.getElementById('bPhone').value.trim(),
    email:document.getElementById('bEmail').value.trim(),
    address:document.getElementById('bAddress').value.trim(),
    notes:document.getElementById('bNotes').value.trim(),
    createdAt:new Date().toISOString()
  };
  await dbAdd(STORES.buyers,buyer);
  closeModal();toast('Buyer added');renderBuyers();
}

// ==================== VIEW BUYER ====================
async function viewBuyer(id){
  const b=await dbGet(STORES.buyers,id);if(!b)return;
  const [sales,products]=await Promise.all([dbGetAll(STORES.sales),dbGetAll(STORES.products)]);
  const bSales=sales.filter(s=>s.buyerId===id);
  const totalSpent=bSales.reduce((sum,s)=>{
    const p=products.find(pr=>pr.id===s.productId);
    return sum+(p?(s.acceptedQty||0)*p.price:0);
  },0);

  openModal(`
    <div class="detail-header">
      <div class="back-btn" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg></div>
      <div class="detail-title">${escHtml(b.name)}</div>
    </div>
    <div class="detail-grid">
      <div class="detail-cell"><div class="detail-cell-label">Company</div><div class="detail-cell-value">${escHtml(b.company||'-')}</div></div>
      <div class="detail-cell"><div class="detail-cell-label">Phone</div><div class="detail-cell-value">${escHtml(b.phone||'-')}</div></div>
      <div class="detail-cell"><div class="detail-cell-label">Email</div><div class="detail-cell-value">${escHtml(b.email||'-')}</div></div>
      <div class="detail-cell"><div class="detail-cell-label">Total Sales</div><div class="detail-cell-value">${bSales.length}</div></div>
      <div class="detail-cell"><div class="detail-cell-label">Total Spent</div><div class="detail-cell-value" style="color:var(--green)">${formatCurrency(totalSpent)}</div></div>
      <div class="detail-cell"><div class="detail-cell-label">Added</div><div class="detail-cell-value">${formatDate(b.createdAt)}</div></div>
    </div>
    ${b.address?`<div style="padding:12px;background:var(--surface2);border-radius:var(--radius-sm);font-size:13px;color:var(--text2);margin-bottom:8px"><div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px">Address</div>${escHtml(b.address)}</div>`:''}
    ${b.notes?`<div style="padding:12px;background:var(--surface2);border-radius:var(--radius-sm);font-size:13px;color:var(--text2);margin-bottom:8px"><div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px">Notes</div>${escHtml(b.notes)}</div>`:''}
    ${bSales.length>0?`
      <div class="section-title" style="margin-top:16px">Purchase History</div>
      <div class="card-list">
        ${bSales.sort((a,b2)=>new Date(b2.date)-new Date(a.date)).map(s=>{
          const p=products.find(pr=>pr.id===s.productId);
          const rev=p?(s.acceptedQty||0)*p.price:0;
          return`<div class="card" onclick="closeModal();setTimeout(()=>viewSale('${s.id}'),300)">
            <div class="card-row">
              <div class="card-info">
                <div class="card-title">${escHtml(p?p.name:'Unknown')}</div>
                <div class="card-sub">${formatDate(s.date)} &middot; ${s.acceptedQty}/${s.offeredQty} pcs</div>
              </div>
              <div class="card-right"><div class="card-amount">${formatCurrencyShort(rev)}</div></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    `:''}
    <div class="btn-row" style="margin-top:16px">
      <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      <button class="btn btn-danger" onclick="deleteBuyer('${b.id}')">Delete</button>
    </div>
  `);
}

async function deleteBuyer(id){
  if(!confirm('Delete this buyer?'))return;
  await dbDelete(STORES.buyers,id);
  closeModal();toast('Buyer deleted');renderBuyers();
}

// ==================== EXPORT ====================
async function exportToExcel(){
  closeSettings();
  const [products,sales,buyers]=await Promise.all([
    dbGetAll(STORES.products),dbGetAll(STORES.sales),dbGetAll(STORES.buyers)
  ]);
  const wb=XLSX.utils.book_new();

  // Products sheet
  const pData=products.map(p=>({
    'Name':p.name,'Design No':p.designNo||'','Category':p.category||'',
    'Price (Rs.)':p.price,'Sizes':p.sizes||'','Notes':p.notes||''
  }));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(pData.length?pData:[{}]),'Products');

  // Sales sheet
  const sData=sales.map(s=>{
    const p=products.find(pr=>pr.id===s.productId);
    const b=buyers.find(bu=>bu.id===s.buyerId);
    return{
      'Date':s.date,'Product':p?p.name:'','Design No':p?p.designNo||'':'',
      'Buyer':b?b.name:'','Offered Qty':s.offeredQty,'Accepted Qty':s.acceptedQty,
      'Unit Price (Rs.)':p?p.price:0,'Revenue (Rs.)':p?(s.acceptedQty||0)*p.price:0,
      'Notes':s.notes||''
    };
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(sData.length?sData:[{}]),'Sales');

  // Buyers sheet
  const bData=buyers.map(b=>({
    'Name':b.name,'Company':b.company||'','Phone':b.phone||'',
    'Email':b.email||'','Address':b.address||'','Notes':b.notes||''
  }));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(bData.length?bData:[{}]),'Buyers');

  XLSX.writeFile(wb,'GarmentFlow_Export_'+new Date().toISOString().split('T')[0]+'.xlsx');
  toast('Excel exported');
}

// ==================== BACKUP / RESTORE ====================
async function backupData(){
  closeSettings();
  const [products,sales,buyers]=await Promise.all([
    dbGetAll(STORES.products),dbGetAll(STORES.sales),dbGetAll(STORES.buyers)
  ]);
  const data=JSON.stringify({products,sales,buyers,exportDate:new Date().toISOString()},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='GarmentFlow_Backup_'+new Date().toISOString().split('T')[0]+'.json';
  a.click();URL.revokeObjectURL(url);
  toast('Backup downloaded');
}

async function restoreData(file){
  closeSettings();
  if(!file)return;
  if(!confirm('This will replace all current data. Continue?'))return;
  const text=await file.text();
  try{
    const data=JSON.parse(text);
    const d=await openDB();
    // Clear all stores
    for(const store of Object.values(STORES)){
      await new Promise((res,rej)=>{
        const tx=d.transaction(store,'readwrite');
        tx.objectStore(store).clear();
        tx.oncomplete=()=>res();
        tx.onerror=e=>rej(e.target.error);
      });
    }
    // Add all data
    if(data.products)for(const item of data.products)await dbAdd(STORES.products,item);
    if(data.sales)for(const item of data.sales)await dbAdd(STORES.sales,item);
    if(data.buyers)for(const item of data.buyers)await dbAdd(STORES.buyers,item);
    toast('Data restored successfully');
    navigate(currentPage);
  }catch(e){
    toast('Error restoring: '+e.message);
  }
  document.getElementById('restoreInput').value='';
}

// ==================== INIT ====================
openDB().then(()=>{
  navigate('dashboard');
}).catch(e=>{
  console.error('DB Error:',e);
  document.getElementById('app').innerHTML='<div style="padding:40px;text-align:center;color:red">Failed to open database: '+e.message+'</div>';
});

// Register service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
